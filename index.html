<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>เจริญไทยสุกี้ • ระบบเช็คสต๊อค</title>

<meta name="theme-color" content="#f97316" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Stock" />

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  body { font-family:'Prompt',sans-serif; }
  .fade-in { animation:fadeIn .2s ease-out; }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
  .pos-footer { padding-bottom: calc(env(safe-area-inset-bottom) + 12px); }
.mode-count { background: linear-gradient(135deg,#dcfce7,#bbf7d0,#86efac); }
.mode-issue { background: linear-gradient(135deg,#e0f2fe,#bae6fd,#7dd3fc); }
</style>
</head>

<body id="appBody" class="bg-gradient-to-br from-orange-50 via-red-50 to-yellow-50 min-h-screen transition-colors duration-300">
<div class="max-w-6xl mx-auto p-6">

  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">🍲 ระบบเช็คสต๊อค • เจริญไทยสุกี้</h1>
    <div class="text-xs text-gray-500">v11 (GitHub Stable)</div>
  </div>

  <div id="login-page">
    <div class="bg-white p-6 rounded-2xl shadow max-w-md mx-auto">
      <h2 class="text-lg font-semibold mb-3">🔐 เข้าสู่ระบบพนักงาน</h2>
      <input type="text" id="employeeName" class="border rounded-xl w-full px-3 py-2 mb-3" placeholder="กรอกชื่อพนักงาน">
      <button id="loginBtn" class="bg-orange-500 text-white w-full py-2 rounded-xl">เข้าสู่ระบบ</button>
      <p class="text-xs text-gray-500 mt-3">* แนะนำ: กรอกชื่อเล่น เช่น “เอ”, “บีม”, “หมี”</p>
    </div>
  </div>

  <div id="home-page" class="hidden">
    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
      <div>👤 <span id="empDisplay" class="font-semibold"></span></div>
      <div class="flex gap-4">
        <button id="logoutBtn" class="text-red-500">ออกจากระบบ</button>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-5">
      <button id="countModeBtn" class="bg-green-600 text-white p-5 rounded-2xl text-lg shadow-lg">
        🟢 นับสต๊อก
        <div class="text-sm opacity-90 mt-1">กรอก “ยอดคงเหลือ” ณ ตอนนั้น</div>
      </button>
      <button id="issueModeBtn" class="bg-blue-600 text-white p-5 rounded-2xl text-lg shadow-lg">
        🔵 เบิกของ
        <div class="text-sm opacity-90 mt-1">เบิกจาก “ห้องสต๊อก” ไปยัง ครัว/หน้าร้าน/บาร์</div>
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow p-5">
      <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
        <div class="font-semibold">เลือกหมวด</div>
        <div class="text-sm text-gray-600">
          โหมด: <span id="action-badge" class="font-semibold text-gray-900">🟢 นับสต๊อก</span>
        </div>
      </div>

      <div class="grid gap-3 md:grid-cols-2">
        <button data-cat="stock" class="catBtn bg-gray-900 text-white p-5 rounded-2xl text-lg shadow">🗄️ ห้องสต๊อก (ของแห้ง/ของสำรอง)</button>
        <button data-cat="front" class="catBtn bg-orange-500 text-white p-5 rounded-2xl text-lg shadow">📦 หน้าร้าน</button>
        <button data-cat="kitchen" class="catBtn bg-red-500 text-white p-5 rounded-2xl text-lg shadow">🍳 ในครัว</button>
        <button data-cat="bar" class="catBtn bg-sky-500 text-white p-5 rounded-2xl text-lg shadow">🥤 บาร์น้ำ</button>
      </div>

      <div class="mt-4 text-xs text-gray-600 leading-relaxed">
        <b>หมายเหตุ:</b> โหมด “เบิกของ” จะให้เบิกจาก <b>ห้องสต๊อก</b> ไปยังปลายทางที่เลือก
      </div>
    </div>
  </div>

  <div id="category-page" class="hidden">
    <div class="flex justify-between items-center mb-4 gap-3 flex-wrap">
      <button id="backBtn" class="bg-gray-400 text-white px-4 py-2 rounded-xl">⬅ กลับ</button>
      <div class="flex items-center gap-2 flex-wrap">
        <div class="font-semibold" id="category-title"></div>
        <span id="action-pill" class="text-xs px-2 py-1 rounded-full bg-gray-100"></span>
      </div>
    </div>

    <div id="issue-destination" class="hidden bg-white p-4 rounded-2xl shadow mb-4">
      <div class="font-semibold mb-2">🔵 เบิกของไปที่ไหน?</div>
      <div class="grid md:grid-cols-3 gap-2">
        <button class="dest-btn bg-orange-50 border rounded-xl py-2" data-dest="front">📦 หน้าร้าน</button>
        <button class="dest-btn bg-red-50 border rounded-xl py-2" data-dest="kitchen">🍳 ในครัว</button>
        <button class="dest-btn bg-sky-50 border rounded-xl py-2" data-dest="bar">🥤 บาร์น้ำ</button>
      </div>
      <div class="text-xs text-gray-600 mt-2">* เบิกได้เฉพาะจาก “ห้องสต๊อก”</div>
    </div>

    <div id="lowCountBadge" class="text-sm text-red-600 font-semibold mb-2"></div>
    <div id="item-list"></div>

    <div class="pos-footer mt-4 flex gap-2 flex-wrap">
      <button id="saveBtn" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow text-lg">💾 บันทึก</button>
      <button id="clearBtn" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-2xl shadow text-lg">ล้างค่า</button>
      <span id="savingHint" class="hidden text-sm text-gray-600 self-center">กำลังบันทึก…</span>
    </div>
  </div>

</div>

<script>
const VERSION = "v11";
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSOEIId8C7BVTxCYwiJoSG7N7k4OSy1TfZXJyDHSD2AWSJ7NWGboHYIqMtqbqP2ISn4Q/exec";

const stockItems = {
  stock: [
    { name:"น้ำจิ้มสุกี้", unit:"ถุง", min:3 },
    { name:"น้ำจิ้มหมูกระทะ", unit:"ขวด", min:2 },
    { name:"ซีอิ๊วขาว", unit:"ขวด", min:2 },
    { name:"น้ำมันงา", unit:"ขวด", min:2 },
    { name:"น้ำตาล", unit:"กก.", min:5 },
    { name:"เห็ดหอม", unit:"กก.", min:2 },
    { name:"ชูรส", unit:"ถุง", min:2 },
    { name:"ซีอิ๊วดำ", unit:"ขวด", min:2 }
  ],
  front: [
    { name:"น้ำจิ้มสุกี้", unit:"ถุง", min:3 },
    { name:"น้ำจิ้มหมูกระทะ", unit:"ขวด", min:2 }
  ],
  kitchen: [
    { name:"น้ำมันงา", unit:"ขวด", min:2 },
    { name:"น้ำตาล", unit:"กก.", min:5 }
  ],
  bar: [
    { name:"โซดา", unit:"ลัง", min:2 },
    { name:"น้ำแดง", unit:"ขวด", min:2 }
  ]
};

let currentCategory = "";
let employee = "";
let currentAction = "count";
let issueDestination = "kitchen";

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getCategoryName(){
  if(currentCategory==="stock") return "ห้องสต๊อก";
  if(currentCategory==="front") return "หน้าร้าน";
  if(currentCategory==="kitchen") return "ในครัว";
  if(currentCategory==="bar") return "บาร์น้ำ";
  return "";
}
function getDestName(dest){
  if(dest==="front") return "หน้าร้าน";
  if(dest==="kitchen") return "ในครัว";
  if(dest==="bar") return "บาร์น้ำ";
  return "";
}

function storageKey(id){ return `qty:${VERSION}:${id}`; }
const qtyWriteBuffer = new Map();
let qtyWriteTimer = null;
function flushQtyBuffer(){
  qtyWriteTimer = null;
  qtyWriteBuffer.forEach((v, id) => localStorage.setItem(storageKey(id), String(v)));
  qtyWriteBuffer.clear();
}
function saveQty(id, v){
  qtyWriteBuffer.set(id, v);
  if(qtyWriteTimer) clearTimeout(qtyWriteTimer);
  qtyWriteTimer = setTimeout(flushQtyBuffer, 120);
}
function getSavedQty(id){
  const raw = localStorage.getItem(storageKey(id));
  if(raw === null) return null;
  const n = parseInt(raw, 10);
  return Number.isFinite(n) ? n : 0;
}

function startApp(){
  employee = localStorage.getItem("employee") || "";
  if(!employee) return;
  document.getElementById("login-page").classList.add("hidden");
  document.getElementById("home-page").classList.remove("hidden");
  document.getElementById("empDisplay").innerText = employee;
  setAction(currentAction);
}
function login(){
  const name = (document.getElementById("employeeName").value || "").trim();
  if(!name) return alert("กรุณากรอกชื่อพนักงาน");
  localStorage.setItem("employee", name);
  startApp();
}
function logout(){
  localStorage.removeItem("employee");
  location.reload();
}

function setAction(action){
  currentAction = action;
  const badge = document.getElementById("action-badge");
  const pill = document.getElementById("action-pill");
  const body = document.getElementById("appBody");

  if(body){
    body.classList.remove("mode-count","mode-issue");
  }

  if(currentAction==="count"){
    badge.innerText = "🟢 นับสต๊อก";
    pill.innerText = "🟢 นับสต๊อก";
    pill.className = "text-xs px-2 py-1 rounded-full bg-green-50 text-green-700";
    if(body) body.classList.add("mode-count");
  }else{
    badge.innerText = "🔵 เบิกของ";
    pill.innerText = "🔵 เบิกของ";
    pill.className = "text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700";
    if(body) body.classList.add("mode-issue");
  }
}

function goHome(){
  document.getElementById("home-page").classList.remove("hidden");
  document.getElementById("category-page").classList.add("hidden");
}

function openCategory(cat){
  currentCategory = cat;
  if(currentAction==="issue" && currentCategory!=="stock"){
    alert("โหมดเบิกของ: กรุณาเข้า “ห้องสต๊อก” เพื่อเบิกของไปปลายทางค่ะ");
    return;
  }
  document.getElementById("home-page").classList.add("hidden");
  document.getElementById("category-page").classList.remove("hidden");
  document.getElementById("category-title").innerText = "หมวด: " + getCategoryName();

  const destBox = document.getElementById("issue-destination");
  if(currentAction==="issue" && currentCategory==="stock"){
    destBox.classList.remove("hidden");
    highlightDestBtn();
  }else{
    destBox.classList.add("hidden");
  }
  renderItems();
}

function setIssueDestination(dest){
  issueDestination = dest;
  highlightDestBtn();
}
function highlightDestBtn(){
  document.querySelectorAll(".dest-btn").forEach(btn => btn.classList.remove("ring-2","ring-blue-500","bg-blue-50"));
  const btn = document.querySelector(`.dest-btn[data-dest="${issueDestination}"]`);
  if(btn) btn.classList.add("ring-2","ring-blue-500","bg-blue-50");
}

function updateLowCount(){
  const badge = document.getElementById("lowCountBadge");
  if(!badge) return;
  if(currentAction !== "count"){ badge.textContent = ""; return; }
  const items = stockItems[currentCategory] || [];
  let low = 0;
  items.forEach((it, i) => {
    const id = `${currentCategory}-${i}`;
    const v = getSavedQty(id) ?? 0;
    if (v < it.min) low += 1;
  });
  badge.textContent = low ? `ต่ำกว่าขั้นต่ำ ${low} รายการ` : "";
}

function onQtyInput(id, min, silent=false){
  const el = document.getElementById(`qty-${id}`);
  if(!el) return;
  const v = parseInt(el.value || "0", 10) || 0;
  saveQty(id, v);
  const warn = document.getElementById(`warn-${id}`);
  const isLow = (currentAction === "count") && (v < min);
  if(warn) warn.classList.toggle("hidden", !isLow);
  if(!silent) updateLowCount();
}

function changeQty(id, min, delta){
  const el = document.getElementById(`qty-${id}`);
  if(!el) return;
  const cur = parseInt(el.value || "0", 10) || 0;
  const next = Math.max(0, cur + delta);
  el.value = next;
  onQtyInput(id, min);
}

function renderItems(){
  const items = stockItems[currentCategory] || [];
  const list = document.getElementById("item-list");
  if(!list) return;

  list.innerHTML = items.map((it, i) => {
    const id = `${currentCategory}-${i}`;
    const val = getSavedQty(id) ?? 0;
    return `
      <div class="bg-white p-4 rounded-2xl shadow mb-3 fade-in">
        <div class="text-2xl font-extrabold leading-snug break-words">${escapeHtml(it.name)}</div>
        <div class="mt-2 flex items-center justify-between gap-3">
          <div class="text-sm text-gray-700 leading-tight">
            <div>หน่วย: <b>${escapeHtml(it.unit)}</b></div>
            <div>ขั้นต่ำ: <b>${it.min}</b></div>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" class="w-12 h-12 rounded-2xl border bg-white text-lg font-semibold active:scale-95 shadow-sm"
              onclick="changeQty('${id}', ${it.min}, -1)">➖</button>
            <input type="number" inputmode="numeric" id="qty-${id}"
              class="border rounded-2xl px-2 py-3 text-center w-32 text-lg font-semibold"
              value="${val}" min="0"
              oninput="onQtyInput('${id}', ${it.min})">
            <button type="button" class="w-12 h-12 rounded-2xl border bg-white text-lg font-semibold active:scale-95 shadow-sm"
              onclick="changeQty('${id}', ${it.min}, 1)">➕</button>
          </div>
        </div>
        <div id="warn-${id}" class="hidden mt-3 text-xs text-red-700 bg-red-50 border border-red-200 p-2 rounded-lg">
          ⚠ ต่ำกว่าขั้นต่ำ แนะนำสั่งเพิ่ม
        </div>
      </div>
    `;
  }).join("");

  items.forEach((it, i) => {
    const id = `${currentCategory}-${i}`;
    onQtyInput(id, it.min, true);
  });
}

function clearInputs(){
  const items = stockItems[currentCategory] || [];
  items.forEach((it, i) => {
    const id = `${currentCategory}-${i}`;
    saveQty(id, 0);
    const el = document.getElementById(`qty-${id}`);
    if(el) el.value = 0;
    const warn = document.getElementById(`warn-${id}`);
    if(warn) warn.classList.add("hidden");
  });
  updateLowCount();
}

async function saveRecords(){
  try{
    const items = stockItems[currentCategory] || [];
    if(currentAction==="issue" && currentCategory!=="stock"){
      return alert("โหมดเบิกของ: ต้องเบิกจากหมวด “ห้องสต๊อก” เท่านั้นค่ะ");
    }

    const today = new Date().toISOString();
    const records = items.map((it, i) => {
      const id = `${currentCategory}-${i}`;
      const qty = String(getSavedQty(id) ?? 0);
      return {
        date: today, employee, category: getCategoryName(), item: it.name, qty,
        note: "", action: currentAction, unit: it.unit, min: String(it.min),
        fromCategory: currentAction==="issue" ? "ห้องสต๊อก" : "",
        toCategory: currentAction==="issue" ? getDestName(issueDestination) : ""
      };
    });

    const btn = document.getElementById("saveBtn");
    const hint = document.getElementById("savingHint");
    if(btn){ btn.disabled = true; btn.classList.add("opacity-70"); btn.textContent = "กำลังบันทึก…"; }
    if(hint){ hint.classList.remove("hidden"); }

    await fetch(GOOGLE_SCRIPT_URL, { method:"POST", mode:"no-cors", body: JSON.stringify(records) });

    if(btn){ btn.disabled = false; btn.classList.remove("opacity-70"); btn.textContent = "💾 บันทึก"; }
    if(hint){ hint.classList.add("hidden"); }

    const lowText = document.getElementById("lowCountBadge")?.textContent || "";
    alert("✅ บันทึกสำเร็จ" + (lowText ? "\n⚠ " + lowText : ""));
    goHome();
  }catch(err){
    console.error(err);
    alert("❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
  }
}



document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("logoutBtn").addEventListener("click", logout);
document.getElementById("backBtn").addEventListener("click", goHome);

document.getElementById("countModeBtn").addEventListener("click", () => setAction("count"));
document.getElementById("issueModeBtn").addEventListener("click", () => setAction("issue"));

document.querySelectorAll(".catBtn").forEach(btn => btn.addEventListener("click", () => openCategory(btn.dataset.cat)));
document.querySelectorAll(".dest-btn").forEach(btn => btn.addEventListener("click", () => setIssueDestination(btn.dataset.dest)));

document.getElementById("saveBtn").addEventListener("click", saveRecords);
document.getElementById("clearBtn").addEventListener("click", clearInputs);

startApp();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try{
      const reg = await navigator.serviceWorker.register(`./sw.js?v=${encodeURIComponent(VERSION)}`);
      if (reg && reg.update) reg.update();
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }catch(e){}
  });
}
</script>
</body>
</html>
