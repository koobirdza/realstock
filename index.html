<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เจริญไทยสุกี้ • RealStock v45</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Prompt',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 45%,#334155 100%)}
    .card{border-radius:1.25rem;box-shadow:0 12px 34px rgba(15,23,42,.25)}
    .panel{background:rgba(255,255,255,.96);border:1px solid rgba(148,163,184,.5)}
    .mode-count{background:linear-gradient(135deg,#14532d,#166534,#22c55e)}
    .mode-issue{background:linear-gradient(135deg,#1e3a8a,#1d4ed8,#3b82f6)}
    .mode-order{background:linear-gradient(135deg,#7c2d12,#c2410c,#fb923c)}
    .mode-receive{background:linear-gradient(135deg,#78350f,#b45309,#f59e0b)}
    .action-btn{background:#1e293b;color:#fff;font-weight:600}
    .nav-btn{background:#334155;color:#fff;font-weight:600}
    .sticky-bottom{position:sticky;bottom:0;background:rgba(255,255,255,.96)}
  </style>
</head>
<body class="min-h-screen text-slate-900">
  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between gap-4 mb-5">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-white">🍲 ระบบเช็คสต๊อก • เจริญไทยสุกี้</h1>
        <p class="text-sm text-slate-300">Inventory Plus v45 • Formula Sheets • Order View • Nightly LINE 23:00</p>
      </div>
      <div class="text-xs text-right text-slate-300">
        <div id="versionLabel"></div>
        <div id="healthBadge">กำลังตรวจสอบเซิร์ฟเวอร์...</div>
        <div id="draftBadge"></div>
      </div>
    </div>
    <div id="fatalError" class="hidden mb-4 rounded-2xl bg-red-50 border border-red-200 p-4 text-red-700"></div>
    <div id="errorPanel" class="hidden mb-4 rounded-2xl bg-amber-50 border border-amber-200 p-4 text-amber-800"></div>
    <div id="toast" class="hidden fixed top-4 right-4 z-50 rounded-2xl px-4 py-3 shadow-xl text-white"></div>

    <section id="loginPage" class="max-w-md mx-auto">
      <div class="card panel p-6">
        <h2 class="text-xl font-semibold mb-4">🔐 เข้าสู่ระบบพนักงาน</h2>
        <input id="employeeName" type="text" class="w-full border rounded-2xl px-4 py-3 mb-3" placeholder="เช่น เอ, บีม, หมี" />
        <button id="loginBtn" class="w-full rounded-2xl bg-slate-900 text-white py-3 font-semibold">เข้าสู่ระบบ</button>
      </div>
    </section>

    <section id="appPage" class="hidden">
      <div class="card panel p-4 md:p-5 mb-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>👤 ผู้ใช้งาน: <span id="employeeDisplay" class="font-semibold"></span></div>
          <div class="flex items-center gap-2 flex-wrap">
            <span id="currentModeBadge" class="px-3 py-1 rounded-full text-sm bg-slate-100">ยังไม่ได้เลือกโหมด</span>
            <button id="logoutBtn" class="px-4 py-2 rounded-xl nav-btn">ออกจากระบบ</button>
          </div>
        </div>
      </div>

      <div class="grid md:grid-cols-4 gap-4 mb-4">
        <button id="countModeBtn" class="card p-5 text-left text-white mode-count"><div class="text-xl font-bold">🟢 นับสต๊อก</div><div class="text-sm mt-1 text-white/90">นับคงเหลือของแต่ละวัน</div></button>
        <button id="issueModeBtn" class="card p-5 text-left text-white mode-issue"><div class="text-xl font-bold">🔵 เบิกของ</div><div class="text-sm mt-1 text-white/90">ใช้กับของในห้องสต๊อกเท่านั้น</div></button>
        <button id="orderModeBtn" class="card p-5 text-left text-white mode-order"><div class="text-xl font-bold">🟠 สั่งของ</div><div class="text-sm mt-1 text-white/90">ดูจำนวนที่ควรสั่งสำหรับวันถัดไป</div></button>
        <button id="receiveModeBtn" class="card p-5 text-left text-white mode-receive"><div class="text-xl font-bold">🟤 รับของเข้า</div><div class="text-sm mt-1 text-white/90">บันทึกของเข้าประจำวัน</div></button>
      </div>

      <div id="navPanel" class="hidden">
        <div class="card panel p-4 md:p-5 mb-4">
          <div class="flex gap-2 flex-wrap items-center justify-between">
            <div>
              <div class="font-semibold">เครื่องมือระบบ</div>
              <div class="text-sm text-slate-500">รีเฟรชชีตสรุปและส่ง LINE สรุปรายวันแบบ manual ได้</div>
            </div>
            <div class="flex gap-2 flex-wrap">
              <button id="healthCheckBtn" class="px-4 py-2 rounded-xl action-btn">เช็กเซิร์ฟเวอร์</button>
              <button id="dailySnapshotBtn" class="px-4 py-2 rounded-xl action-btn">ภาพรวมวันนี้</button>
              <button id="refreshLineSummaryBtn" class="px-4 py-2 rounded-xl action-btn">รีเฟรช LINE Summary</button>
              <button id="previewLineSummaryBtn" class="px-4 py-2 rounded-xl action-btn">Preview LINE</button>
              <button id="sendLineSummaryBtn" class="px-4 py-2 rounded-xl action-btn">ส่ง LINE สรุป</button>
              <button id="testLineOABtn" class="px-4 py-2 rounded-xl action-btn">ทดสอบ LINE OA</button>
              <button id="exportDebugBtn" class="px-4 py-2 rounded-xl action-btn">Export Debug</button>
              <button id="exportTargetsBtn" class="px-4 py-2 rounded-xl action-btn">Export Target IDs</button>
            </div>
          </div>
        </div>

        <div class="card panel p-4 md:p-5 mb-4">
          <div class="flex items-center justify-between gap-3 flex-wrap mb-4">
            <div><div class="text-sm text-slate-500">ตำแหน่งปัจจุบัน</div><div id="breadcrumb" class="font-semibold"></div></div>
            <div class="flex gap-2"><button id="homeBtn" class="px-4 py-2 rounded-xl nav-btn">หน้าแรก</button><button id="backBtn" class="px-4 py-2 rounded-xl nav-btn">ย้อนกลับ</button></div>
          </div>
          <div id="destinationWrap" class="hidden mb-4"><div class="text-sm font-semibold text-slate-700 mb-2">ปลายทางการเบิก</div><div id="destinationButtons" class="grid grid-cols-1 sm:grid-cols-3 gap-2"></div></div>
          <div id="nodeList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
          <div id="itemPanel" class="hidden"></div>
        </div>
      </div>
    </section>
  </div>
  <script type="module" src="./src/app.v45.js"></script>
</body>
</html>
