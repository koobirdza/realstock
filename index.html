<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>RealStock v48 Extreme Fast</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root{--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#0f172a;--count:#16a34a;--issue:#2563eb;--receive:#ea580c;--order:#ca8a04;--danger:#dc2626;--ok:#16a34a;--warn:#d97706;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px}
    *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    button,input,textarea{font:inherit}.app{max-width:1100px;margin:0 auto;padding:16px 16px 96px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:14px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700}.muted{color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.hero{padding:16px;display:grid;gap:12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.grow{flex:1 1 220px}
    input[type=text], input[type=number], textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 14px;outline:none} input:focus, textarea:focus{border-color:#94a3b8}
    .btn{border:0;border-radius:14px;padding:12px 14px;background:var(--primary);color:#fff;cursor:pointer;font-weight:600}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.btn:disabled{opacity:.55;cursor:not-allowed}
    .modes{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.mode-btn{padding:14px;border-radius:18px;border:1px solid var(--line);background:#fff;text-align:left;cursor:pointer;transition:.12s transform ease,.12s background ease,.12s border-color ease}.mode-btn:hover{transform:translateY(-1px)}.mode-btn.active{color:#fff;border-color:transparent}
    .mode-count.active{background:var(--count)} .mode-issue.active{background:var(--issue)} .mode-receive.active{background:var(--receive)} .mode-order.active{background:var(--order)}
    .toolbar,.content{margin-top:16px}.toolbar{padding:12px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 12px;border-radius:999px;background:#eef2ff;color:#334155;font-size:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.nav-card{padding:16px;cursor:pointer;min-height:96px;display:flex;flex-direction:column;justify-content:space-between}.nav-card strong{font-size:17px}
    .section{padding:16px}.section h3{margin:0 0 12px}.list{display:grid;gap:12px}.item{padding:14px;border:1px solid var(--line);border-radius:16px;display:grid;gap:10px}.item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .meta{display:flex;gap:8px;flex-wrap:wrap}.pill{font-size:13px;background:#f1f5f9;border-radius:999px;padding:6px 10px}.qty{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center}.quick{display:flex;gap:8px;flex-wrap:wrap}.quick button{padding:8px 10px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer}
    .footerbar{position:fixed;left:0;right:0;bottom:0;background:rgba(248,250,252,.88);backdrop-filter:blur(10px);border-top:1px solid var(--line)}.footer-inner{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}
    .toast-wrap{position:fixed;right:16px;bottom:84px;display:grid;gap:8px;z-index:30}.toast{padding:12px 14px;border-radius:14px;color:#fff;box-shadow:var(--shadow);min-width:220px}.toast.info{background:#334155}.toast.success{background:var(--ok)}.toast.error{background:var(--danger)}.toast.warn{background:var(--warn)}
    .hidden{display:none!important}.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f8fafc 37%,#e2e8f0 63%);background-size:400% 100%;animation:sk 1.1s infinite;border-radius:14px;height:84px}@keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}.admin{margin-top:16px;padding:16px}
    @media (max-width:720px){.modes{grid-template-columns:repeat(2,minmax(0,1fr))}.qty{grid-template-columns:1fr}.footer-inner{align-items:stretch}.footer-inner .row{width:100%}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <div class="brand"><div class="logo">RS</div><div><div><strong>RealStock v48 Extreme Fast</strong></div><div class="muted">GitHub Pages + Apps Script + Google Sheets</div></div></div>
      <div class="muted" id="healthText">กำลังเช็กระบบ...</div>
    </div>
    <section class="card hero">
      <div class="row"><div class="grow"><input id="employeeInput" type="text" placeholder="ชื่อพนักงาน" /></div><button class="btn" id="loginBtn">เข้าสู่ระบบ</button><button class="btn secondary hidden" id="logoutBtn">ออกจากระบบ</button></div>
      <div class="modes" id="modeGrid">
        <button class="mode-btn mode-count" data-mode="count"><strong>🟢 นับสต๊อก</strong><div class="muted">นับของคงเหลือจริง</div></button>
        <button class="mode-btn mode-issue" data-mode="issue"><strong>🔵 เบิกของ</strong><div class="muted">เบิกจากห้องสต๊อก</div></button>
        <button class="mode-btn mode-receive" data-mode="receive"><strong>🟠 รับของ</strong><div class="muted">รับของเข้าระบบ</div></button>
        <button class="mode-btn mode-order" data-mode="order"><strong>🟡 สั่งของ</strong><div class="muted">บันทึกสั่งซื้อ</div></button>
      </div>
    </section>
    <section class="card toolbar hidden" id="toolbar"><div class="chips" id="breadcrumbs"></div><div class="row"><button class="btn ghost" id="homeBtn">หน้าแรก</button><button class="btn ghost" id="backBtn">ย้อนกลับ</button><button class="btn ghost" id="refreshBtn">รีเฟรชข้อมูล</button></div></section>
    <main class="content" id="content"></main>
    <section class="card admin hidden" id="adminPanel"><h3 style="margin-top:0">Admin Tools</h3><div class="row"><button class="btn secondary" id="rebuildBtn">Rebuild Views</button><button class="btn secondary" id="warmBtn">Warm Caches</button></div><div class="muted" style="margin-top:10px">หน้านี้จะแสดงเมื่อเปิดด้วย ?admin=1 เท่านั้น</div></section>
  </div>
  <div class="footerbar hidden" id="footerBar"><div class="footer-inner"><div class="muted" id="footerHint">พร้อมบันทึก</div><div class="row"><button class="btn secondary" id="clearBtn">ล้างค่า</button><button class="btn" id="saveBtn">บันทึก</button></div></div></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <script type="module" src="./src/app.v48.js"></script>
</body>
</html>
